name: predict

on:
  repository_dispatch:
    types: [predict]

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements-predict.txt

      - name: Extract metadata
        id: meta
        run: |
          echo "RUN_ID=${{ github.event.client_payload.run_id }}" >> $GITHUB_ENV
          echo "RACE_NUM=${{ github.event.client_payload.race_num }}" >> $GITHUB_ENV
          echo "CARD_DATE=${{ github.event.client_payload.card_date }}" >> $GITHUB_ENV
          echo "TRACK_CODE=${{ github.event.client_payload.track_code }}" >> $GITHUB_ENV

      - name: Enrich entries with historical features
        run: |
          python enrich_entries.py \
            --entries test_data.csv \
            --history all_tracks_2014_2026.csv

      - name: Run prediction
        run: |
          python predict.py \
            --input test_data.csv \
            --output race_predictions/all_race_predictions.csv \
            --models-dir models/v4

      - name: Convert to JSON
        run: |
          python .github/scripts/predict_api.py \
            --input race_predictions/all_race_predictions.csv \
            --output predictions/run_${RUN_ID}.json \
            --track "$TRACK_CODE" \
            --date "$CARD_DATE" \
            --race "$RACE_NUM"

      - name: Cleanup old predictions
        run: |
          if [ -n "$TRACK_CODE" ] && [ -n "$CARD_DATE" ] && [ -n "$RACE_NUM" ]; then
            python .github/scripts/cleanup_predictions.py \
              --dir predictions \
              --keep "run_${RUN_ID}.json" \
              --track "$TRACK_CODE" \
              --date "$CARD_DATE" \
              --race "$RACE_NUM" \
              --max-age 120
          fi

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/ race_predictions/
          git diff --staged --quiet || git commit -m "Predictions: ${TRACK_CODE} ${CARD_DATE} R${RACE_NUM}"
          git push
